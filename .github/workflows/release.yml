name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  mac-release:
    name: Build macOS release
    runs-on: macos-26
    env:
      PROJECT_PATH: Cue3.xcodeproj
      SCHEME: Cue3
      APP_NAME: Cue3
      DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer
      APPLE_DEVELOPER_ID_CERTIFICATE_BASE64: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_BASE64 }}
      APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD }}
      APPLE_NOTARY_API_KEY_BASE64: ${{ secrets.APPLE_NOTARY_API_KEY_BASE64 }}
      APPLE_NOTARY_API_KEY_ID: ${{ secrets.APPLE_NOTARY_API_KEY_ID }}
      APPLE_NOTARY_API_ISSUER_ID: ${{ secrets.APPLE_NOTARY_API_ISSUER_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 26.5
        run: sudo xcode-select -s "$DEVELOPER_DIR"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Resolve version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must be a semantic version like vX.Y.Z"
            exit 1
          fi
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION#v}" >> "$GITHUB_OUTPUT"
          echo "build_number=${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Detect signing configuration
        id: signing
        shell: bash
        run: |
          CONFIGURED=0
          for VALUE in \
            "$APPLE_DEVELOPER_ID_CERTIFICATE_BASE64" \
            "$APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            "$APPLE_NOTARY_API_KEY_BASE64" \
            "$APPLE_NOTARY_API_KEY_ID" \
            "$APPLE_NOTARY_API_ISSUER_ID"
          do
            if [[ -n "$VALUE" ]]; then
              CONFIGURED=$((CONFIGURED + 1))
            fi
          done

          if [[ "$CONFIGURED" -eq 0 ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          elif [[ "$CONFIGURED" -eq 5 ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "Developer ID signing configuration is incomplete"
            exit 1
          fi

      - name: Import Developer ID certificate
        if: steps.signing.outputs.enabled == 'true'
        id: signing-keychain
        shell: bash
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/cue3-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 24)"
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"

          echo "::add-mask::$KEYCHAIN_PASSWORD"
          printf '%s' "$APPLE_DEVELOPER_ID_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$APPLE_DEVELOPER_ID_CERTIFICATE_PASSWORD" \
            -A
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"

          SIGNING_IDENTITY="$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | awk '/Developer ID Application/ { print $2; exit }')"
          if [[ -z "$SIGNING_IDENTITY" ]]; then
            echo "Developer ID Application identity was not found"
            exit 1
          fi
          echo "identity=$SIGNING_IDENTITY" >> "$GITHUB_OUTPUT"
          echo "keychain_path=$KEYCHAIN_PATH" >> "$GITHUB_OUTPUT"

      - name: Archive app
        run: |
          xcodebuild archive \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination "generic/platform=macOS" \
            -archivePath "$RUNNER_TEMP/$APP_NAME.xcarchive" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_ALLOWED=YES \
            CODE_SIGNING_REQUIRED=YES \
            MARKETING_VERSION="${{ steps.version.outputs.version }}" \
            CURRENT_PROJECT_VERSION="${{ steps.version.outputs.build_number }}"

      - name: Sign app with Developer ID
        if: steps.signing.outputs.enabled == 'true'
        shell: bash
        run: |
          ARCHIVE_APP="$RUNNER_TEMP/$APP_NAME.xcarchive/Products/Applications/$APP_NAME.app"
          codesign \
            --force \
            --options runtime \
            --timestamp \
            --sign "${{ steps.signing-keychain.outputs.identity }}" \
            "$ARCHIVE_APP"
          codesign --verify --deep --strict --verbose=2 "$ARCHIVE_APP"

      - name: Notarize and staple app
        if: steps.signing.outputs.enabled == 'true'
        shell: bash
        run: |
          ARCHIVE_APP="$RUNNER_TEMP/$APP_NAME.xcarchive/Products/Applications/$APP_NAME.app"
          NOTARY_ARCHIVE="$RUNNER_TEMP/$APP_NAME-notarization.zip"
          NOTARY_KEY_PATH="$RUNNER_TEMP/AuthKey_$APPLE_NOTARY_API_KEY_ID.p8"

          printf '%s' "$APPLE_NOTARY_API_KEY_BASE64" | base64 --decode > "$NOTARY_KEY_PATH"
          ditto -c -k --sequesterRsrc --keepParent "$ARCHIVE_APP" "$NOTARY_ARCHIVE"
          xcrun notarytool submit "$NOTARY_ARCHIVE" \
            --key "$NOTARY_KEY_PATH" \
            --key-id "$APPLE_NOTARY_API_KEY_ID" \
            --issuer "$APPLE_NOTARY_API_ISSUER_ID" \
            --wait
          xcrun stapler staple "$ARCHIVE_APP"
          xcrun stapler validate "$ARCHIVE_APP"

      - name: Package app
        id: package
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          DIST_ROOT="$RUNNER_TEMP/dist"
          RELEASE_DIR="$DIST_ROOT/$APP_NAME/$TAG"
          ARCHIVE_APP="$RUNNER_TEMP/$APP_NAME.xcarchive/Products/Applications/$APP_NAME.app"
          ASSET_BASENAME="$APP_NAME-$TAG-macOS"
          ZIP_PATH="$RELEASE_DIR/$ASSET_BASENAME.zip"
          CHECKSUM_PATH="$RELEASE_DIR/$ASSET_BASENAME.sha256.txt"
          NOTES_PATH="$RELEASE_DIR/RELEASE_NOTES.txt"

          if [[ "${{ steps.signing.outputs.enabled }}" == "true" ]]; then
            SIGNING_STATUS="Developer ID signed and notarized"
          else
            SIGNING_STATUS="ad-hoc signed and not notarized"
          fi

          mkdir -p "$RELEASE_DIR"
          codesign --verify --deep --strict --verbose=2 "$ARCHIVE_APP"
          codesign -dv --verbose=4 "$ARCHIVE_APP"
          ditto -c -k --sequesterRsrc --keepParent "$ARCHIVE_APP" "$ZIP_PATH"
          shasum -a 256 "$ZIP_PATH" > "$CHECKSUM_PATH"
          cat > "$NOTES_PATH" <<EOF
          $APP_NAME $VERSION

          Signing: $SIGNING_STATUS

          Included files:
          - $ASSET_BASENAME.zip
          - $ASSET_BASENAME.sha256.txt

          Install:
          1. Download and unzip $ASSET_BASENAME.zip
          2. Drag $APP_NAME.app into Applications
          3. If Gatekeeper blocks launch, right-click the app and choose Open
          4. If Accessibility permission keeps prompting, remove old Cue3 entries from System Settings first, then grant the Cue3.app in Applications again
          EOF

          echo "asset_basename=$ASSET_BASENAME" >> "$GITHUB_OUTPUT"
          echo "release_dir=$RELEASE_DIR" >> "$GITHUB_OUTPUT"
          echo "zip_path=$ZIP_PATH" >> "$GITHUB_OUTPUT"
          echo "checksum_path=$CHECKSUM_PATH" >> "$GITHUB_OUTPUT"
          echo "notes_path=$NOTES_PATH" >> "$GITHUB_OUTPUT"
          echo "signing_status=$SIGNING_STATUS" >> "$GITHUB_OUTPUT"

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.asset_basename }}
          path: ${{ steps.package.outputs.release_dir }}

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ env.APP_NAME }} ${{ steps.version.outputs.tag }}
          generate_release_notes: true
          body: |
            macOS release package for `${{ env.APP_NAME }}`.

            Signing: `${{ steps.package.outputs.signing_status }}`.

            Files:
            - `${{ steps.package.outputs.asset_basename }}.zip`
            - `${{ steps.package.outputs.asset_basename }}.sha256.txt`

            Install:
            1. Download and unzip `${{ steps.package.outputs.asset_basename }}.zip`
            2. Drag `${{ env.APP_NAME }}.app` into `Applications`
            3. If Gatekeeper blocks launch, right-click the app and choose `Open`
            4. If Accessibility permission keeps prompting, remove old Cue3 entries from System Settings first, then grant the `Cue3.app` in `Applications` again
          files: |
            ${{ steps.package.outputs.zip_path }}
            ${{ steps.package.outputs.checksum_path }}

      - name: Remove temporary signing keychain
        if: always() && steps.signing.outputs.enabled == 'true'
        shell: bash
        run: |
          security delete-keychain "${{ steps.signing-keychain.outputs.keychain_path }}" || true
