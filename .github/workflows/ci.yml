name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  mac-ci:
    name: Mac app CI
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.5.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26.5
        run: sudo xcode-select -s "$DEVELOPER_DIR"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Xcode Debug build
        run: xcodebuild -project Cue3.xcodeproj -scheme Cue3 -configuration Debug build CODE_SIGNING_ALLOWED=NO

      - name: Xcode tests
        run: xcodebuild -project Cue3.xcodeproj -scheme Cue3 -configuration Debug -destination "platform=macOS" test CODE_SIGNING_ALLOWED=NO

      - name: Xcode Release build
        run: xcodebuild -project Cue3.xcodeproj -scheme Cue3 -configuration Release build CODE_SIGNING_ALLOWED=NO
